services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jeval}
      POSTGRES_USER: ${POSTGRES_USER:-jeval}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jeval}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jeval} -d ${POSTGRES_DB:-jeval}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    environment:
      JEVAL_HOST: 0.0.0.0
      JEVAL_PORT: 8000
      JEVAL_DB_URL: postgresql+psycopg://${POSTGRES_USER:-jeval}:${POSTGRES_PASSWORD:-jeval}@db:5432/${POSTGRES_DB:-jeval}
      JEVAL_FRONTEND_URL: ${FRONTEND_PUBLIC_URL:-http://127.0.0.1:5173}
      JEVAL_GOOGLE_REDIRECT_URI: ${BACKEND_PUBLIC_URL:-http://127.0.0.1:8001}/api/auth/google/callback
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${BACKEND_PUBLIC_URL:-http://127.0.0.1:8001}
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
