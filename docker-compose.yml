services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jeval
      POSTGRES_USER: jeval
      POSTGRES_PASSWORD: jeval
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeval -d jeval"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      JEVAL_HOST: 0.0.0.0
      JEVAL_PORT: 8000
      JEVAL_DB_URL: postgresql+psycopg://jeval:jeval@db:5432/jeval
      JEVAL_AUTH_REQUIRED: "true"
      JEVAL_SESSION_DAYS: 30
      JEVAL_FRONTEND_URL: http://127.0.0.1:5173
      JEVAL_GOOGLE_REDIRECT_URI: http://127.0.0.1:8001/api/auth/google/callback
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://127.0.0.1:8001
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
